name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # This repo restores packages from renv.lock rather than a DESCRIPTION,
      # so GitHub Actions cannot infer the native libraries needed by packages
      # such as curl, sf, terra, s2, units, and clipr. Install them explicitly
      # before setup-renv runs renv::restore().
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            cmake \
            gdal-bin \
            libcurl4-openssl-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libssl-dev \
            libudunits2-dev \
            libx11-dev \
            pkg-config

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2

      - name: Check renv synchronization
        run: Rscript scripts/check_renv_sync.R

      - name: Run unit tests
        run: Rscript tests/run_tests.R

      - name: Run analysis
        run: Rscript run_analysis.R

      - name: Verify key outputs exist
        run: |
          test -f data-derived/papers_clean.csv
          test -f data-derived/summary_review_process.csv
          test -f figures/review_process.png
          test -f figures/location.png

      - name: Check committed outputs are current
        run: git diff --exit-code -- data-derived figures
