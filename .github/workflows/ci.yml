name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2

      - name: Check renv synchronization
        run: Rscript --vanilla scripts/check_renv_sync.R

      - name: Run unit tests
        run: Rscript --vanilla tests/run_tests.R

      - name: Run analysis
        run: Rscript --vanilla run_analysis.R

      - name: Verify key outputs exist
        run: |
          test -f data-derived/papers_clean.csv
          test -f data-derived/summary_review_process.csv
          test -f figures/review_process.png
          test -f figures/location.png

      - name: Check committed outputs are current
        run: git diff --exit-code -- data-derived figures
